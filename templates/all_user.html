<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/admin-style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/btn-style.css')}}">
    <title>Users</title>
</head>
<body style="background: radial-gradient(circle at center, #2d7a5e 0%, #163d2e 100%);">
    <header>
        <a style="text-decoration: none;" href="{{ url_for('comits')}}"><button class="glass-button-white">Додати коміт</button></a>
        <a style="text-decoration: none;" href="{{ url_for('all_users') }}"><button class="glass-button-white active">Перелік користувачів</button></a>
        <a style="text-decoration: none;" href="{{ url_for('admin') }}"><button class="glass-button-white">Додати лісництво</button></a>
        <a style="text-decoration: none;" href="{{ url_for('change') }}"><button class="glass-button-white">Керувати лісництвами</button></a>
        <a style="text-decoration: none;" href="{{ url_for('main') }}"><button class="glass-button-white">Головна сторінка</button></a>
    </header>
    <div style="display: flex; justify-content: center; width: 100%; gap: 40px;">
        <div class="input-box box-litel" style="height: 450px; margin-top: 50px; position: sticky; top: 100px;">
            <h1>Сотрувати за</h1>
            <form style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;" action="{{ url_for('all_users') }}" method="GET">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;">
                    <select name="sort" id="sort" class="input-box">
                        <option value="id" {% if request.args.get('sort') == 'id' %}selected{% endif %}>ID</option>
                        <option value="username" {% if request.args.get('sort') == 'username' %}selected{% endif %}>Іменем (Username)</option>
                        <option value="gmail" {% if request.args.get('sort') == 'gmail' %}selected{% endif %}>Поштою (Email)</option>
                        <option value="isAdmin" {% if request.args.get('sort') == 'isAdmin' %}selected{% endif %}>Роллю (Адмін/Користувач)</option>
                    </select>
    
                    <select name="order" id="order" class="input-box">
                        <option value="asc" {% if request.args.get('order') == 'asc' %}selected{% endif %}>За зростанням (А-Я, 0-9)</option>
                        <option value="desc" {% if request.args.get('order') == 'desc' %}selected{% endif %}>За спаданням (Я-А, 9-0)</option>
                    </select>
                </div>

                <div style="display: flex; flex-direction: column; align-items: center; gap: 30px;">
                    <button type="submit" class="submit-btn">Застосувати</button>
                    <a href="{{ url_for('all_users') }}"><button type="button" class="submit-btn">Скинути</button></a>
                </div>
            </form>
        </div>
        <main class="users-container">
            {% for user in users %}
            <div class="user-card">
                
                <div class="user-info">
                    <h3>{{ user.username }} <span style="font-size: 14px; font-weight: normal; opacity: 0.6;">(ID: {{ user.id }})</span></h3>
                    <p><strong>Пошта:</strong> {{ user.gmail }}</p>
                    
                    {% if user.isAdmin %}
                        <p class="status-admin">● Адміністратор</p>
                    {% else %}
                        <p class="status-user">● Користувач</p>
                    {% endif %}
                </div>

                <div class="user-actions">
                    <form action="{{ url_for('toggle_admin', id=user.id) }}" method="POST" style="margin: 0;">
                        <button type="submit" class="action-btn" onclick="return confirm('Ви впевнені?')">
                            {% if user.isAdmin %}
                                Зробити користувачем
                            {% else %}
                                Зробити адміністратором
                            {% endif %}
                        </button>
                    </form>

                    <form action="{{ url_for('delete_user', id=user.id) }}" method="POST" style="margin: 0;">
                        <button type="submit" class="action-btn delete-btn" onclick="return confirm('Ви впевнені?')">Видалити</button>
                    </form>
                </div>

            </div>
            {% endfor %}
        </main>
    </div>
</body>
</html>
