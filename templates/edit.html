<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/admin-style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/btn-style.css') }}">
    <title>Edit</title>
</head>
<body style="background: radial-gradient(circle at center, #2d7a5e 0%, #163d2e 100%);">
    <header>
        <a href="{{ url_for('comits')}}"><button class="glass-button-white">Додати коміт</button></a>
        <a href="{{ url_for('all_users') }}"><button class="glass-button-white">Перелік користувачів</button></a>
        <a href="{{ url_for('admin') }}"><button class="glass-button-white active">Додати лісництво</button></a>
        <a href="{{ url_for('change') }}"><button class="glass-button-white">Керувати лісництвами</button></a>
        <a href="{{ url_for('main') }}"><button class="glass-button-white">Головна сторінка</button></a>
    </header>
    <main>
        <form action="{{ url_for('edit', id=forest.id) }}" method="post">
            <div>
                <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 10px;">
                    <div class="input-box box-litel">
                        <h1>Місце знаходження</h1>
                        <label for="">Надлісництво</label>
                        <select name="mainForest" id="">
                            <option value="Звернігородське" {% if forest.mainForest == 'Звернігородське' %}selected{% endif %}>Звернігородське</option>
                            <option value="Корсунь-Шевченківське" {% if forest.mainForest == 'Корсунь-Шевченківське' %}selected{% endif %}>Корсунь-Шевченківське</option>
                            <option value="Черкаське" {% if forest.mainForest == 'Черкаське' %}selected{% endif %}>Черкаське</option>
                        </select>
            
                        <label for="">Лісництво</label>
                        <input type="text" name="forest" value="{{ forest.forest }}" required>
                    </div>

                
                    <div class="input-box box-big">
                        <h1>Планування</h1>
                        <label for="">Вид рубки</label>
                        <select name="typeCutting" id="">
                            <option value="РГК" {% if forest.typeCutting == 'РГК' %}selected{% endif %}>РГК</option>
                            <option value="ОСВ" {% if forest.typeCutting == 'ОСВ' %}selected{% endif %}>ОСВ</option>
                            <option value="ПРЧ" {% if forest.typeCutting == 'ПРЧ' %}selected{% endif %}>ПРЧ</option>
                            <option value="ПРЖ" {% if forest.typeCutting == 'ПРЖ' %}selected{% endif %}>ПРЖ</option>
                            <option value="ПРХ" {% if forest.typeCutting == 'ПРХ' %}selected{% endif %}>ПРХ</option>
                        </select>
                        
                        <label for="">Об'єм відповідно до матеріалів лісовпорядкування</label>
                        <input type="number" name="volumeForestManagement" value="{{ forest.volumeForestManagement }}" required>
                    </div>
                </div>

                <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">

                    <div class="input-box box-big">
                        <h1>Характеристики ділянки</h1>
                        <label for="">Квартал</label>
                        <input type="number" name="quarter" value="{{ forest.quarter }}" required>
        
                        <label for="">Виділ</label>
                        <input type="number" step="any" name="department" value="{{ forest.department }}" required>
        
                        <label for="">Площа</label>
                        <input type="number" step="any" name="area" value="{{ forest.area }}" required>
                    </div>
        
                    <div class="input-box box-litel">
                        <h1>Дата рубки</h1>
                        <label for="">Місяць</label>
                        <select name="month" id="">
                            <option value="Січень" {% if forest.month == 'Січень' %}selected{% endif %}>Січень</option>
                            <option value="Лютий" {% if forest.month == 'Лютий' %}selected{% endif %}>Лютий</option>
                            <option value="Березень" {% if forest.month == 'Березень' %}selected{% endif %}>Березень</option>
                            <option value="Квітень" {% if forest.month == 'Квітень' %}selected{% endif %}>Квітень</option>
                            <option value="Травень" {% if forest.month == 'Травень' %}selected{% endif %}>Травень</option>
                            <option value="Червень" {% if forest.month == 'Червень' %}selected{% endif %}>Червень</option>
                            <option value="Липень" {% if forest.month == 'Липень' %}selected{% endif %}>Липень</option>
                            <option value="Серпень" {% if forest.month == 'Серпень' %}selected{% endif %}>Серпень</option>
                            <option value="Вересень" {% if forest.month == 'Вересень' %}selected{% endif %}>Вересень</option>
                            <option value="Жовтень" {% if forest.month == 'Жовтень' %}selected{% endif %}>Жовтень</option>
                            <option value="Листопад" {% if forest.month == 'Листопад' %}selected{% endif %}>Листопад</option>
                            <option value="Грудень" {% if forest.month == 'Грудень' %}selected{% endif %}>Грудень</option>
                        </select>
            
                        <label for="">Декада</label>
                        <input type="text" name="decade" value="{{ forest.decade }}" required>
            
                        <label for="">Рік рубки</label>
                        <select name="year" id="">
                            <option value="2020" {% if forest.year == '2020' %}selected{% endif %}>2020</option>
                            <option value="2021" {% if forest.year == '2021' %}selected{% endif %}>2021</option>
                            <option value="2022" {% if forest.year == '2022' %}selected{% endif %}>2022</option>
                            <option value="2023" {% if forest.year == '2023' %}selected{% endif %}>2023</option>
                            <option value="2024" {% if forest.year == '2024' %}selected{% endif %}>2024</option>
                            <option value="2025" {% if forest.year == '2025' %}selected{% endif %}>2025</option>
                            <option value="2026" {% if forest.year == '2026' %}selected{% endif %}>2026</option>
                        </select> 
                    </div>
                </div>
            </div>
            <div>
                <p style="width: 200px; text-align: justify; color: #fff;">Перед надсиланням переконайтесь, що всі дані введено правильно</p>
                <button type="submit" class="submit-btn">Зберегти</button>
            </div>
        </form>
    </main>
</body>
</html>
