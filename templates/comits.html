<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/admin-style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/btn-style.css') }}">
    <title>Comits</title>
</head>
<body style="background: radial-gradient(circle at center, #2d7a5e 0%, #163d2e 100%);">
    
    <header>
        <a style="text-decoration: none;" href="{{ url_for('comits')}}"><button class="glass-button-white active">Додати коміт</button></a>
        <a style="text-decoration: none;" href="{{ url_for('all_users') }}"><button class="glass-button-white">Перелік користувачів</button></a>
        <a style="text-decoration: none;" href="{{ url_for('admin') }}"><button class="glass-button-white">Додати лісництво</button></a>
        <a style="text-decoration: none;" href="{{ url_for('change') }}"><button class="glass-button-white">Керувати лісництвами</button></a>
        <a style="text-decoration: none;" href="{{ url_for('main') }}"><button class="glass-button-white">Головна сторінка</button></a>
    </header>

    <div style="display: flex; justify-content: center; width: 100%; gap: 40px; padding: 0px;">
        
        <div class="input-box" style="height: 300px; padding-bottom: 30px; margin-top: 50px; position: sticky; top: 100px; min-width: 150px; width: 300px;">
            <h1 style="color: white; text-align: center; margin-bottom: 10px;">Новий коміт</h1>
            <form action="/comits" method="POST" style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px;">
                
                <input type="text" name="username" class="input-box" placeholder="Username" value="{{ current_user.username }}" readonly>
                
                <input type="text" name="comment" class="input-box" placeholder="Коментар" required>
                
                <button type="submit" class="submit-btn" style="width: 90%; margin-top: 10px;">Додати коміт</button>
            </form>
        </div>

        <main style="margin-top: 50px; flex-grow: 1; max-width: 900px;">
            <h1 style="color: white; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px;">Історія комітів</h1>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                {% for commit in comits|reverse %}
                <div class="text-light" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px;">
                    
                    <div style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <strong>{{ commit.username }}</strong>
                        <span style="opacity: 0.6; font-size: 0.85em;">{{ commit.date }}</span>
                    </div>
                    
                    <p style="margin: 0 0 15px 0; font-size: 1.05em; word-wrap: break-word;">{{ commit.comment }}</p>
                    
                    <form action="/delete_commit/{{ commit.id }}" method="POST" style="margin: 0; text-align: right;">
                        <button type="submit" onclick="return confirm('Ви впевнені, що хочете видалити цей коміт?')" class="action-btn delete-btn">
                            Видалити
                        </button>
                    </form>

                </div>
                {% endfor %}
            </div>
            
        </main>
    </div>
</body>
</html>
