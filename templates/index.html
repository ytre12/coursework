<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/scroll-style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main-style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/commit.css') }}">
    <title>Main</title>
</head>
<body>
    <header>
        <h1>Name of app</h1>
        <div class="header-btn">
            {% if current_user.is_authenticated %}
                <button>Вітаємо {{ current_user.username }}</button>
                {% if current_user.isAdmin %}
                    <a href="{{ url_for('admin') }}"><button>Адміністрування</button></a>
                {% endif %}
                <a href="{{ url_for('favorite') }}"><button>Улюблені</button></a>
                <a href="{{ url_for('forum') }}"><button>Форум</button></a>
                <a href="{{ url_for('about_ass') }}"><button>Про нас</button></a>
                <a href="{{ url_for('logout') }}"><button>Вийти</button></a>
                <button id="open-commit">Notification</button>
            {% else %}
                <a href="{{ url_for('login') }}"><button>Увійти</button></a>
                <a href="{{ url_for('register') }}"><button>Зареєструватись</button></a>
            {% endif %}
        </div>
    </header>
    <main>
        <div class="btn-forest-navigation">
            <button id="seting-btn">Налаштування</button>
            <button id="forestOne-btn">Звенигородське</button>
            <button id="forestTwo-btn">Корсунь-Шевченківське</button>
            <button id="forestThree-btn">Черкаське</button>
        </div>
        <div></div>
    </main>

    <div class="modal-overlay" id="main-modal">
        <div class="modal-content">
            <div class="btn-navigation">
                <button onclick="sortData('mainForest')" id="sort-main-forest">Main Forest</button>
                <button onclick="sortData('forest')">Forest</button>
                <button onclick="sortData('typeCutting')">Type of Cutting</button>
                <button onclick="sortData('quarter')">Quarter</button>
                <button onclick="sortData('department')">Department</button>
                <button onclick="sortData('area')">Area</button>
                <button onclick="sortData('volumeForestManagement')">Volume</button>
                <button onclick="sortData('month')">Month</button>
                <button onclick="sortData('decade')">Decade</button>
                <button onclick="sortData('year')">Year</button>
                <button id="close-modal">Close</button>
            </div>
            <div id="forest-container">
                </div>
        </div>
    </div>

    <div class="commit-modal">
        <button id="commit-modal-close">Close</button>
        <div class="commit-conteiner">
            {% for comit in comits %}
                <div class="commit">
                    <div>
                        <p>{{ comit.username }}</p>
                        <p>{{ comit.date }}</p>
                    </div>
                    <p>{{ comit.comment }}</p>
                </div>
            {% endfor %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='scripts/openCommitWindow.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/openDbWindow.js') }}"></script>
</body>
</html>
